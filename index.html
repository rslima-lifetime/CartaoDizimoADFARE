<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ADFARE Dízimos" />
    <link rel="apple-touch-icon" href="/logo_adfare.png" />
    
    <!-- Theme color for browser bars -->
    <meta name="theme-color" content="#1e3a8a" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Aplicativo de controle de dízimos digital para a Igreja Assembleia de Deus Ministério Família Restaurada (ADFARE)." />
    <title>ADFARE Dízimos - Controle Digital</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker registration script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registrado com sucesso!', reg))
            .catch(err => console.log('Falha ao registrar PWA Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
